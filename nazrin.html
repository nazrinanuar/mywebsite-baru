<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Soal PAI SD</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- docx.js for Word Export -->
    <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.min.js"></script>
    
    <!-- Marked.js for Markdown Parsing in Output -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        /* Custom scrollbar for better look */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Markdown styles for output */
        .prose p { margin-bottom: 0.75em; }
        .prose ul { list-style-type: disc; margin-left: 1.5em; margin-bottom: 1em; }
        .prose ol { list-style-type: decimal; margin-left: 1.5em; margin-bottom: 1em; }
        .prose strong { font-weight: 600; color: #1e293b; }
        .prose h1, .prose h2, .prose h3 { font-weight: 700; margin-top: 1.5em; margin-bottom: 0.5em; color: #0f172a; }
        .prose h3 { font-size: 1.125rem; }
    </style>
</head>

<body class="bg-slate-50 min-h-screen text-slate-800 font-sans p-4 md:p-8">

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

    <div class="max-w-4xl mx-auto bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-slate-900 flex items-center justify-center gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-emerald-600"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
                Generator Soal PAI SD
            </h1>
            <p class="text-slate-500 mt-2 text-sm md:text-base">Buat soal Pendidikan Agama Islam dengan mudah dibantu AI.</p>
        </div>

        <!-- Inputs Section -->
        <div class="space-y-4 mb-6 bg-slate-50 p-5 rounded-xl border border-slate-100">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Materi Pokok</label>
                <input id="materi" type="text" class="w-full border border-slate-300 p-3 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-shadow bg-white" placeholder="Contoh: Puasa Sunnah, Kisah Nabi Nuh, Rukun Iman...">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Kelas</label>
                    <select id="kelas" class="w-full border border-slate-300 p-3 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none bg-white">
                        <option value="1">Kelas 1</option>
                        <option value="2">Kelas 2</option>
                        <option value="3">Kelas 3</option>
                        <option value="4">Kelas 4</option>
                        <option value="5">Kelas 5</option>
                        <option value="6">Kelas 6</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Fokus Soal</label>
                    <select id="fokus" onchange="handleFokusChange()" class="w-full border border-slate-300 p-3 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none bg-white">
                        <option value="Standar">Standar (Sesuai Jenis)</option>
                        <option value="HOTS">HOTS (Analisis & Studi Kasus)</option>
                        <option value="Karakter">Pendidikan Karakter & Moral</option>
                        <option value="Paket">Paket Lengkap (PG, Isian, Uraian)</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="opsi-standar">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Jenis Soal</label>
                    <select id="jenis" class="w-full border border-slate-300 p-3 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none bg-white">
                        <option>Pilihan Ganda</option>
                        <option>Isian Singkat</option>
                        <option>Uraian</option>
                        <option>Benar Salah</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Jumlah Soal</label>
                    <input id="jumlah" type="number" min="1" max="20" value="5" class="w-full border border-slate-300 p-3 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none bg-white">
                </div>
            </div>
            <p id="paket-info" class="text-sm text-emerald-600 hidden font-medium bg-emerald-50 p-2 rounded border border-emerald-100">
                Mode Paket akan menghasilkan: 5 Pilihan Ganda, 3 Isian, dan 2 Uraian secara otomatis.
            </p>
        </div>

        <!-- Action Button -->
        <button onclick="generate()" id="btn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3.5 px-4 rounded-xl shadow-sm transition-colors flex items-center justify-center gap-2 disabled:bg-slate-400 disabled:cursor-not-allowed">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
            <span id="btn-text">Generate Soal</span>
        </button>

        <!-- Loading Indicator -->
        <div id="loading" class="hidden my-8 flex flex-col items-center justify-center text-slate-500">
            <svg class="animate-spin -ml-1 mr-3 h-8 w-8 text-emerald-600 mb-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p>AI sedang menyusun soal yang terbaik untukmu...</p>
        </div>

        <!-- Output Container -->
        <div id="output-container" class="hidden mt-8">
            <div class="flex items-center justify-between mb-3 border-b border-slate-200 pb-3">
                <h2 class="text-lg font-bold text-slate-800">Hasil Generate</h2>
                <div class="flex gap-2">
                    <button onclick="copyText()" class="flex items-center gap-1.5 bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-medium px-3 py-1.5 rounded-lg transition-colors border border-slate-200">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        Copy
                    </button>
                    <button onclick="downloadWord()" class="flex items-center gap-1.5 bg-blue-50 hover:bg-blue-100 text-blue-700 text-sm font-medium px-3 py-1.5 rounded-lg transition-colors border border-blue-200">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                        Word
                    </button>
                </div>
            </div>
            
            <div id="hasil" class="prose text-slate-700 bg-white p-5 rounded-xl border border-slate-200 max-h-[600px] overflow-y-auto"></div>
        </div>

    </div>

<script>
    // System Config
    const apiKey = ""; // API Key disuntikkan oleh environment
    const model = "gemini-2.5-flash-preview-09-2025";
    window.lastText = "";

    // Custom Toast Notification instead of alert()
    function showToast(message, type = "info") {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        
        let bgColor = type === 'error' ? 'bg-red-500' : (type === 'success' ? 'bg-emerald-500' : 'bg-slate-800');
        
        toast.className = `${bgColor} text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 transform transition-all duration-300 translate-x-full opacity-0 max-w-sm`;
        toast.innerHTML = `
            <span class="text-sm font-medium">${message}</span>
        `;
        
        container.appendChild(toast);
        
        // Animate in
        setTimeout(() => {
            toast.classList.remove('translate-x-full', 'opacity-0');
        }, 10);
        
        // Remove after 3s
        setTimeout(() => {
            toast.classList.add('opacity-0', 'translate-x-full');
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    // Handle UI changes based on focus
    function handleFokusChange() {
        const fokus = document.getElementById("fokus").value;
        const opsiStandar = document.getElementById("opsi-standar");
        const paketInfo = document.getElementById("paket-info");
        
        if (fokus === "Paket") {
            opsiStandar.classList.add("hidden");
            paketInfo.classList.remove("hidden");
        } else {
            opsiStandar.classList.remove("hidden");
            paketInfo.classList.add("hidden");
        }
    }

    // Exponential Backoff for API calls
    async function fetchWithRetry(url, options, retries = 5) {
        const delays = [1000, 2000, 4000, 8000, 16000];
        
        for (let i = 0; i < retries; i++) {
            try {
                const response = await fetch(url, options);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                return await response.json();
            } catch (error) {
                if (i === retries - 1) throw error;
                await new Promise(resolve => setTimeout(resolve, delays[i]));
            }
        }
    }

    async function generate() {
        const materi = document.getElementById("materi").value.trim();
        const kelas = document.getElementById("kelas").value;
        const jenis = document.getElementById("jenis").value;
        const jumlah = document.getElementById("jumlah").value;
        const fokus = document.getElementById("fokus").value;

        const hasilDiv = document.getElementById("hasil");
        const btn = document.getElementById("btn");
        const btnText = document.getElementById("btn-text");
        const loading = document.getElementById("loading");
        const outputContainer = document.getElementById("output-container");

        if (!materi) {
            showToast("Harap isi materi pokok terlebih dahulu!", "error");
            document.getElementById("materi").focus();
            return;
        }

        // UI Loading State
        btn.disabled = true;
        btnText.innerText = "Memproses...";
        outputContainer.classList.add("hidden");
        loading.classList.remove("hidden");

        let prompt = "";

        // Logic Fokus
        if (fokus === "HOTS") {
            prompt = `Buat ${jumlah} soal berstandar HOTS (Higher Order Thinking Skills) untuk mata pelajaran Pendidikan Agama Islam SD kelas ${kelas}.
Materi: ${materi}

Instruksi tambahan:
- Gunakan studi kasus sederhana atau cerita pendek di setiap soal yang relevan dengan anak SD.
- Sisipkan pertanyaan yang menuntut penalaran, bukan sekadar hafalan.
- Berikan Kunci Jawaban beserta penjelasan logisnya di bagian bawah.
- Format teks menggunakan Markdown yang rapi.`;
        }
        else if (fokus === "Karakter") {
            prompt = `Buat ${jumlah} soal untuk mata pelajaran Pendidikan Agama Islam SD kelas ${kelas} yang menitikberatkan pada pembentukan karakter.
Materi: ${materi}

Instruksi tambahan:
- Fokuskan pertanyaan pada pengaplikasian nilai-nilai kejujuran, tanggung jawab, dan kedisiplinan ibadah dalam kehidupan sehari-hari.
- Berikan Kunci Jawaban beserta pesan moral dari setiap soal.
- Format teks menggunakan Markdown yang rapi.`;
        }
        else if (fokus === "Paket") {
            prompt = `Buat sebuah paket soal ulangan Pendidikan Agama Islam SD kelas ${kelas}.
Materi: ${materi}

Struktur Paket Soal:
1. Bagian A: 5 Soal Pilihan Ganda (A, B, C, D)
2. Bagian B: 3 Soal Isian Singkat
3. Bagian C: 2 Soal Uraian/Esai

Instruksi tambahan:
- Gunakan bahasa yang jelas dan sesuai dengan usia anak SD kelas ${kelas}.
- Sertakan Kunci Jawaban lengkap untuk ketiga bagian tersebut di akhir dokumen.
- Pisahkan setiap bagian dengan jelas.
- Format teks menggunakan Markdown yang rapi.`;
        }
        else {
            prompt = `Buat ${jumlah} soal berbentuk ${jenis} untuk mata pelajaran Pendidikan Agama Islam SD kelas ${kelas}.
Materi: ${materi}

Instruksi tambahan:
- Gunakan bahasa yang sederhana dan mudah dipahami siswa SD.
- Berikan kunci jawaban yang jelas di bagian akhir.
- Format teks menggunakan Markdown yang rapi.

Format yang diharapkan:
### SOAL
[Daftar soal]

### KUNCI JAWABAN
[Kunci jawaban]`;
        }

        try {
            const data = await fetchWithRetry(
                `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`,
                {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: {
                            temperature: 0.7,
                        }
                    })
                }
            );

            const text = data.candidates?.[0]?.content?.parts?.[0]?.text;

            if (!text) throw new Error("Format respons tidak valid dari AI.");

            window.lastText = text;
            
            // Render markdown using marked.js
            hasilDiv.innerHTML = marked.parse(text);
            
            loading.classList.add("hidden");
            outputContainer.classList.remove("hidden");
            showToast("Soal berhasil dibuat!", "success");

            // Scroll to output
            outputContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

        } catch (err) {
            loading.classList.add("hidden");
            showToast("Gagal menyusun soal: " + err.message, "error");
        } finally {
            btn.disabled = false;
            btnText.innerText = "Generate Soal";
        }
    }

    // COPY FUNCTION (With Fallback)
    function copyText() {
        if (!window.lastText) return showToast("Belum ada soal yang bisa disalin", "error");
        
        // Try clipboard API first
        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(window.lastText).then(() => {
                showToast("Teks soal disalin ke clipboard!", "success");
            }).catch(() => {
                fallbackCopyText(window.lastText);
            });
        } else {
            fallbackCopyText(window.lastText);
        }
    }

    function fallbackCopyText(text) {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        
        // Avoid scrolling to bottom
        textArea.style.top = "0";
        textArea.style.left = "0";
        textArea.style.position = "fixed";

        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();

        try {
            const successful = document.execCommand('copy');
            if(successful) {
                showToast("Teks soal disalin ke clipboard!", "success");
            } else {
                showToast("Gagal menyalin teks.", "error");
            }
        } catch (err) {
            showToast("Gagal menyalin teks.", "error");
        }

        document.body.removeChild(textArea);
    }

    // DOWNLOAD WORD
    async function downloadWord() {
        if (!window.lastText) return showToast("Harap buat soal terlebih dahulu", "error");

        const { Document, Packer, Paragraph, TextRun, HeadingLevel } = docx;

        // Simple text parsing to create basic Word paragraphs
        const lines = window.lastText.split("\n");
        const docChildren = [];

        for (let line of lines) {
            line = line.trim();
            if (!line) {
                // Empty line
                docChildren.push(new Paragraph({ text: "" }));
                continue;
            }

            // Simple Markdown handling for Word (Headings and Bold)
            if (line.startsWith("### ")) {
                docChildren.push(new Paragraph({
                    text: line.replace("### ", ""),
                    heading: HeadingLevel.HEADING_3,
                    spacing: { before: 240, after: 120 }
                }));
            } else if (line.startsWith("## ")) {
                docChildren.push(new Paragraph({
                    text: line.replace("## ", ""),
                    heading: HeadingLevel.HEADING_2,
                    spacing: { before: 240, after: 120 }
                }));
            } else if (line.startsWith("# ")) {
                docChildren.push(new Paragraph({
                    text: line.replace("# ", ""),
                    heading: HeadingLevel.HEADING_1,
                    spacing: { before: 360, after: 120 }
                }));
            } else {
                // Handling bold text rudimentarily (**text**)
                const parts = line.split(/(\*\*.*?\*\*)/g);
                const textRuns = parts.map(part => {
                    if (part.startsWith("**") && part.endsWith("**")) {
                        return new TextRun({ text: part.slice(2, -2), bold: true });
                    }
                    return new TextRun({ text: part });
                });

                docChildren.push(new Paragraph({ 
                    children: textRuns,
                    spacing: { after: 120 }
                }));
            }
        }

        const doc = new Document({
            sections: [{ 
                properties: {},
                children: docChildren 
            }]
        });

        try {
            const blob = await Packer.toBlob(doc);
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            
            const materiInput = document.getElementById("materi").value.trim();
            const filename = materiInput ? `Soal_PAI_${materiInput.replace(/[^a-z0-9]/gi, '_')}.docx` : "Soal_PAI.docx";
            
            a.download = filename;
            a.click();
            URL.revokeObjectURL(a.href);
            showToast("Dokumen berhasil diunduh!", "success");
        } catch(e) {
            showToast("Gagal membuat dokumen Word.", "error");
            console.error(e);
        }
    }
</script>

</body>
</html>
